<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eden Nest Farm — Operations Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#26241D; --ink-soft:#5B5A4E; --sage:#8C9A85;
    --paper:#FBF8F1; --paper-dim:#F2EEE2;
    --forest:#1F3329; --forest-soft:#2B4436;
    --yolk:#E8A93D; --yolk-deep:#C88A22; --clay:#BE5A3B;
    --line:#E3DDC9; --ok:#4C7A5C; --warn:#C88A22; --danger:#BE5A3B;
    --radius:10px;
    --shadow: 0 1px 2px rgba(38,36,29,0.06), 0 4px 14px rgba(38,36,29,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:'IBM Plex Sans', sans-serif; background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Space Grotesk', sans-serif; letter-spacing:-0.01em;}
  .mono{font-family:'IBM Plex Mono', monospace;}
  a{color:inherit;} button{font-family:inherit;}
  :focus-visible{outline:2px solid var(--yolk-deep); outline-offset:2px;}

  #app{display:flex; min-height:100vh;}

  #sidebar{width:246px; flex-shrink:0; background:var(--forest); color:#EFE9D8; display:flex; flex-direction:column; position:sticky; top:0; height:100vh;}
  .brand{padding:20px 20px 14px 20px; border-bottom:1px solid rgba(239,233,216,0.12);}
  .brand-mark{display:flex; align-items:center; gap:10px;}
  .brand-egg{width:20px; height:24px; flex-shrink:0;}
  .brand-name{font-family:'Space Grotesk'; font-weight:600; font-size:15.5px; line-height:1.15;}
  .brand-sub{font-size:10px; color:#B9C4B4; margin-top:4px; text-transform:uppercase; letter-spacing:0.08em; font-family:'IBM Plex Mono';}
  nav{flex:1; overflow-y:auto; padding:8px 9px;}
  .nav-item{display:flex; align-items:center; gap:10px; padding:7.5px 10px; margin-bottom:1px; border-radius:7px; cursor:pointer; font-size:13px; color:#D9D3BE; transition:background 0.12s ease, color 0.12s ease; border:none; background:none; width:100%; text-align:left;}
  .nav-item svg{width:15px; height:15px; opacity:0.85; flex-shrink:0;}
  .nav-item:hover{background:rgba(239,233,216,0.08); color:#F5F1E3;}
  .nav-item.active{background:var(--yolk); color:#2A2109; font-weight:600;}
  .nav-item.active svg{opacity:1;}
  .nav-item .nbadge{margin-left:auto; background:var(--clay); color:#fff; font-size:9.5px; border-radius:100px; padding:1px 6px; font-family:'IBM Plex Mono';}
  .nav-group-label{font-size:9.5px; text-transform:uppercase; letter-spacing:0.09em; color:#7E8C79; padding:12px 10px 5px 10px; font-family:'IBM Plex Mono';}
  .sidebar-foot{padding:12px 20px; border-top:1px solid rgba(239,233,216,0.12); font-size:10.5px; color:#8C9987; line-height:1.5;}

  #main{flex:1; min-width:0; display:flex; flex-direction:column;}
  #topbar{padding:20px 32px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; justify-content:space-between; background:var(--paper); position:sticky; top:0; z-index:5;}
  .eyebrow{font-family:'IBM Plex Mono'; font-size:11px; text-transform:uppercase; letter-spacing:0.09em; color:var(--sage); margin-bottom:4px;}
  #page-title{font-size:23px; font-weight:600; margin:0;}
  #topbar .right{display:flex; align-items:center; gap:16px;}
  #topbar .date{font-family:'IBM Plex Mono'; font-size:12.5px; color:var(--ink-soft);}
  .bell-btn{position:relative; background:none; border:1px solid var(--line); border-radius:8px; width:34px; height:34px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .bell-btn:hover{background:var(--paper-dim);}
  .bell-dot{position:absolute; top:5px; right:6px; width:7px; height:7px; border-radius:50%; background:var(--clay);}
  #content{padding:28px 32px 60px 32px; flex:1;}

  .card{background:#fff; border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px 22px; margin-bottom:20px;}
  .card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .card-title{font-size:15px; font-weight:600; margin:0; font-family:'Space Grotesk';}
  .card-title small{display:block; font-family:'IBM Plex Sans'; font-weight:400; font-size:12px; color:var(--ink-soft); margin-top:2px;}

  .grid{display:grid; gap:18px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:2fr 1fr;}
  @media (max-width:1100px){ .grid-4{grid-template-columns:repeat(2,1fr);} .grid-2{grid-template-columns:1fr;} }

  .stat-card{background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow);}
  .stat-label{font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft); font-family:'IBM Plex Mono'; margin-bottom:8px;}
  .stat-value{font-size:26px; font-weight:600; font-family:'Space Grotesk';}
  .stat-delta{font-size:12px; margin-top:6px; font-family:'IBM Plex Mono';}
  .up{color:var(--ok);} .down{color:var(--danger);}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; font-family:'IBM Plex Mono'; font-weight:500; text-transform:uppercase; font-size:10.5px; letter-spacing:0.05em; color:var(--ink-soft); padding:8px 10px; border-bottom:1px solid var(--line);}
  td{padding:9px 10px; border-bottom:1px solid var(--paper-dim);}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--paper-dim);}

  .badge{display:inline-block; padding:3px 9px; border-radius:100px; font-size:11px; font-weight:600; font-family:'IBM Plex Mono';}
  .badge-ok{background:#E3EEE3; color:var(--ok);}
  .badge-warn{background:#F7E9D2; color:var(--warn);}
  .badge-danger{background:#F5DED4; color:var(--danger);}
  .badge-neutral{background:var(--paper-dim); color:var(--ink-soft);}

  .btn{display:inline-flex; align-items:center; gap:6px; background:var(--forest); color:#F5F1E3; border:none; padding:8px 14px; border-radius:7px; font-size:13px; font-weight:500; cursor:pointer; transition:background 0.12s ease;}
  .btn:hover{background:var(--forest-soft);}
  .btn-yolk{background:var(--yolk); color:#2A2109;}
  .btn-yolk:hover{background:var(--yolk-deep); color:#fff;}
  .btn-ghost{background:none; color:var(--ink); border:1px solid var(--line);}
  .btn-ghost:hover{background:var(--paper-dim);}
  .btn-sm{padding:5px 10px; font-size:12px;}

  input, select, textarea{font-family:'IBM Plex Sans'; font-size:13px; padding:8px 10px; border:1px solid var(--line); border-radius:6px; background:#fff; color:var(--ink); width:100%;}
  label{font-size:12px; font-weight:500; color:var(--ink-soft); margin-bottom:5px; display:block;}
  .form-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:14px;}
  .form-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:6px;}

  .modal-backdrop{position:fixed; inset:0; background:rgba(31,51,41,0.35); display:flex; align-items:center; justify-content:center; z-index:50;}
  .modal{background:#fff; border-radius:12px; padding:24px 26px; width:480px; max-width:92vw; max-height:86vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.25);}
  .modal h3{margin:0 0 16px 0; font-size:17px;}

  .empty{text-align:center; padding:40px 20px; color:var(--ink-soft); font-size:13.5px;}
  .empty b{display:block; color:var(--ink); font-size:15px; margin-bottom:4px; font-family:'Space Grotesk';}

  .egg-gauge-wrap{display:flex; align-items:center; gap:20px;}
  .flock-dots{display:flex; flex-wrap:wrap; gap:7px; margin-top:10px;}
  .flock-dot{width:11px; height:11px; border-radius:50%; background:var(--ok);}
  .flock-dot.warn{background:var(--warn);} .flock-dot.danger{background:var(--danger);}

  .toast{position:fixed; bottom:24px; right:24px; background:var(--forest); color:#F5F1E3; padding:11px 18px; border-radius:8px; font-size:13px; box-shadow:var(--shadow); z-index:100; opacity:0; transform:translateY(8px); transition:all 0.2s ease;}
  .toast.show{opacity:1; transform:translateY(0);}

  .pipeline{display:flex; gap:8px; flex-wrap:wrap;}
  .pipeline-stage{flex:1; min-width:110px; background:var(--paper-dim); border-radius:8px; padding:12px 14px; text-align:center;}
  .pipeline-stage .n{font-size:22px; font-weight:600; font-family:'Space Grotesk';}
  .pipeline-stage .l{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.05em; font-family:'IBM Plex Mono'; margin-top:2px;}

  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:10px; flex-wrap:wrap;}

  .notif-panel{position:fixed; top:70px; right:32px; width:340px; max-height:70vh; overflow-y:auto; background:#fff; border:1px solid var(--line); border-radius:12px; box-shadow:0 20px 50px rgba(0,0,0,0.18); z-index:60; padding:8px;}
  .notif-item{display:flex; gap:10px; padding:11px 12px; border-radius:8px; align-items:flex-start;}
  .notif-item:hover{background:var(--paper-dim);}
  .notif-dot{width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0;}
  .notif-text{font-size:12.5px; line-height:1.4;}
  .notif-text b{display:block; font-size:12.5px;}
  .notif-text span{color:var(--ink-soft); font-size:11.5px;}

  .placeholder-tag{background:var(--paper-dim); color:var(--ink-soft); font-family:'IBM Plex Mono'; font-size:10.5px; padding:2px 8px; border-radius:100px; text-transform:uppercase; letter-spacing:0.05em;}

  ::-webkit-scrollbar{width:9px; height:9px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}
</style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg class="brand-egg" viewBox="0 0 40 48" fill="none"><path d="M20 2C11 14 4 26 4 34C4 42.3 11.2 46 20 46C28.8 46 36 42.3 36 34C36 26 29 14 20 2Z" fill="#E8A93D"/></svg>
        <div class="brand-name">Eden Nest</div>
      </div>
      <div class="brand-sub">Farm Operations Platform</div>
    </div>
    <nav id="nav-list"></nav>
    <div class="sidebar-foot">Managed remotely from Dubai<br>eden-nest-erp v2.0</div>
  </aside>

  <div id="main">
    <div id="topbar">
      <div>
        <div class="eyebrow">Eden Nest Farm</div>
        <h1 id="page-title">Dashboard</h1>
      </div>
      <div class="right">
        <div class="date mono" id="today-date"></div>
        <button class="bell-btn" id="bell-btn" title="Notifications">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#26241D" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8C6 15 3 17 3 17H21S18 15 18 8Z"/><path d="M13.7 21A2 2 0 0 1 10.3 21"/></svg>
          <span class="bell-dot" id="bell-dot" style="display:none;"></span>
        </button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="modal-root"></div>
<div id="notif-root"></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   EDEN NEST FARM ERP PLATFORM — single-file app, 16 modules
   Data persists via window.storage (personal, not shared)
========================================================= */

const ORDER_STAGES = ['Order Created','Confirmed','Packed','Out for Delivery','Delivered','Payment Completed'];
const ORDER_CHANNELS = ['Website','WhatsApp','Mobile App','Sales Team'];
const MODULES = [
  {id:'dashboard', label:'Executive Dashboard', icon:'grid'},
  {group:'Farm'},
  {id:'farm', label:'Farm Management', icon:'leaf'},
  {id:'production', label:'Production', icon:'egg'},
  {id:'quality', label:'Quality Control', icon:'check'},
  {id:'inventory', label:'Inventory', icon:'box'},
  {group:'Commerce'},
  {id:'products', label:'Product Management', icon:'tag'},
  {id:'crm', label:'CRM', icon:'heart'},
  {id:'orders', label:'Order Management', icon:'cart'},
  {id:'subscriptions', label:'Subscription', icon:'repeat'},
  {id:'delivery', label:'Delivery Management', icon:'truck'},
  {id:'payments', label:'Payment & Accounting', icon:'card'},
  {group:'People & Supply'},
  {id:'suppliers', label:'Supplier Management', icon:'ship'},
  {id:'employees', label:'Employee Management', icon:'users'},
  {group:'Insight'},
  {id:'analytics', label:'Analytics', icon:'chart'},
  {id:'notifications', label:'Notification', icon:'bell'},
  {id:'franchise', label:'Franchise Management', icon:'building'},
];

const ICONS = {
  grid:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
  leaf:'<path d="M4 20C4 10 12 3 21 3C21 12 14 20 4 20Z"/><path d="M4 20C7 15 11 11 16 8" stroke="var(--forest)" stroke-width="1.3" fill="none"/>',
  egg:'<path d="M12 2C8 8 4 14 4 18.5C4 22.6 7.6 25 12 25C16.4 25 20 22.6 20 18.5C20 14 16 8 12 2Z"/>',
  check:'<circle cx="12" cy="12" r="9"/><path d="M8 12.5L11 15.5L16 9" stroke-width="2" fill="none"/>',
  box:'<path d="M3 8L12 4L21 8V17L12 21L3 17V8Z"/><path d="M3 8L12 12L21 8" stroke-width="1.5" fill="none"/><path d="M12 12V21" stroke-width="1.5"/>',
  tag:'<path d="M3 12L12 3H20V11L11 20L3 12Z"/><circle cx="15.5" cy="7.5" r="1.4" fill="#fff"/>',
  cart:'<circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/><path d="M2 3H5L7.5 15H19L21 6H6" stroke-width="1.8" fill="none"/>',
  repeat:'<path d="M4 8H16L13 5" stroke-width="1.8" fill="none"/><path d="M20 16H8L11 19" stroke-width="1.8" fill="none"/>',
  truck:'<rect x="2" y="7" width="12" height="9" rx="1"/><path d="M14 10H18L21 13V16H14V10Z"/><circle cx="6" cy="18" r="1.7"/><circle cx="17.5" cy="18" r="1.7"/>',
  card:'<rect x="2.5" y="5.5" width="19" height="13" rx="2"/><rect x="2.5" y="9" width="19" height="3"/>',
  heart:'<path d="M12 21C12 21 3 15 3 9C3 5.5 6 3.5 9 4.5C10.5 5 12 6.5 12 8C12 6.5 13.5 5 15 4.5C18 3.5 21 5.5 21 9C21 15 12 21 12 21Z"/>',
  chart:'<path d="M3 21V3" stroke-width="1.8" fill="none"/><path d="M3 21H21" stroke-width="1.8" fill="none"/><rect x="6" y="13" width="3" height="6"/><rect x="11" y="8" width="3" height="11"/><rect x="16" y="5" width="3" height="14"/>',
  ship:'<path d="M4 16L2 21H22L20 16" stroke-width="1.6" fill="none"/><path d="M6 16V6H16L18 16" stroke-width="1.6" fill="none"/><path d="M9 6V3H14V6" stroke-width="1.6" fill="none"/>',
  users:'<circle cx="9" cy="8" r="3.3"/><path d="M3 20C3 15.5 5.5 13 9 13C12.5 13 15 15.5 15 20" stroke-width="0" /><circle cx="17" cy="9" r="2.6" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M3 20C3 15.5 5.5 13 9 13C12.5 13 15 15.5 15 20Z"/><path d="M15.5 14C18 14.3 20 16.5 20 20" stroke="currentColor" stroke-width="1.6" fill="none"/>',
  bell:'<path d="M18 8A6 6 0 0 0 6 8C6 15 3 17 3 17H21S18 15 18 8Z"/><path d="M13.7 21A2 2 0 0 1 10.3 21" fill="none" stroke="currentColor" stroke-width="1.6"/>',
  building:'<rect x="4" y="3" width="10" height="18" rx="1"/><rect x="15" y="9" width="6" height="12" rx="1"/><rect x="7" y="6" width="2" height="2"/><rect x="11" y="6" width="2" height="2"/><rect x="7" y="10" width="2" height="2"/><rect x="11" y="10" width="2" height="2"/><rect x="7" y="14" width="2" height="2"/><rect x="11" y="14" width="2" height="2"/>',
};

let STATE = null;
let currentPage = 'dashboard';
let charts = {};
let notifOpen = false;

const KEY = 'eden-nest-erp-data-v2';
const uid = () => Math.random().toString(36).slice(2,9);
const fmtMoney = n => '₹' + Number(n||0).toLocaleString('en-IN', {maximumFractionDigits:0});
const fmtDate = d => new Date(d).toLocaleDateString('en-IN', {day:'2-digit', month:'short'});
const daysAgo = n => { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); };
const daysAhead = n => { const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const todayISO = () => new Date().toISOString().slice(0,10);

/* ---------- Demo data seed ---------- */
function seedData(){
  const flockNames = ['Flock A','Flock B','Flock C','Flock D'];
  const flockBreed = {'Flock A':'White Leghorn','Flock B':'White Leghorn','Flock C':'BV-380','Flock D':'BV-380'};
  const flockFarm = {'Flock A':'farm-a','Flock B':'farm-a','Flock C':'farm-a','Flock D':'farm-b'};
  const flockBirds = {'Flock A':520,'Flock B':480,'Flock C':410,'Flock D':350};
  const production = [];
  for(let i=29;i>=0;i--){
    flockNames.forEach((f,fi)=>{
      const base = [420,380,310,260][fi];
      const eggsProduced = Math.round(base + (Math.random()*40-20));
      const birdsCount = flockBirds[f];
      const mortality = Math.random()<0.15 ? 1+Math.floor(Math.random()*2) : 0;
      const brokenEggs = Math.round(eggsProduced*(0.01+Math.random()*0.02));
      const productionPercentage = +(eggsProduced/birdsCount*100).toFixed(1);
      production.push({
        id:uid(), farmId:flockFarm[f], date:daysAgo(i), flock:f, breed:flockBreed[f],
        birdsCount, mortality, brokenEggs, productionPercentage,
        qualityGrade: brokenEggs/eggsProduced>0.025 ? 'B' : 'A', createdBy:'Roshan',
        quantity:eggsProduced, feedKg:Math.round(eggsProduced*0.11), eggsProduced,
      });
    });
  }
  const quality = [];
  for(let i=13;i>=0;i--){
    const total = production.filter(p=>p.date===daysAgo(i)).reduce((s,p)=>s+p.quantity,0);
    const rejected = Math.round(total*(0.02+Math.random()*0.02));
    const gradeA = Math.round(total*0.72);
    const gradeB = Math.round(total*0.20);
    const gradeC = total - gradeA - gradeB - rejected;
    quality.push({id:uid(), date:daysAgo(i), batch:'B-'+(1000+i), gradeA, gradeB, gradeC:Math.max(gradeC,0), rejected, notes: rejected>total*0.035 ? 'Higher cracks than usual — check tray handling' : 'Within normal range'});
  }
  const inventory = [
    {id:uid(), item:'Grade A — 6 pack', category:'Finished Products', stock:184, unit:'packs', reorder:80},
    {id:uid(), item:'Grade A — 12 pack', category:'Finished Products', stock:96, unit:'packs', reorder:60},
    {id:uid(), item:'Grade A — 30 tray', category:'Finished Products', stock:41, unit:'trays', reorder:50},
    {id:uid(), item:'Grade B — 30 tray', category:'Finished Products', stock:22, unit:'trays', reorder:30},
    {id:uid(), item:'Limestone (calcium)', category:'Raw Materials', stock:310, unit:'kg', reorder:200},
    {id:uid(), item:'Maize', category:'Raw Materials', stock:850, unit:'kg', reorder:500},
    {id:uid(), item:'Egg cartons (6-pack)', category:'Packaging', stock:210, unit:'pcs', reorder:150},
    {id:uid(), item:'Egg trays (30ct)', category:'Packaging', stock:38, unit:'pcs', reorder:60},
    {id:uid(), item:'Shipping labels', category:'Packaging', stock:520, unit:'pcs', reorder:200},
    {id:uid(), item:'Layer mash feed', category:'Feed', stock:640, unit:'kg', reorder:400},
    {id:uid(), item:'Starter feed', category:'Feed', stock:95, unit:'kg', reorder:120},
    {id:uid(), item:'Feeder trolleys', category:'Equipment', stock:5, unit:'units', reorder:3},
    {id:uid(), item:'Egg grading machine', category:'Equipment', stock:1, unit:'units', reorder:1},
  ];
  const batches = [
    {id:uid(), itemId:inventory[9].id, batchNo:'FD-2201', quantity:400, receivedDate:daysAgo(20), expiryDate:daysAgo(-10)},
    {id:uid(), itemId:inventory[9].id, batchNo:'FD-2202', quantity:240, receivedDate:daysAgo(5), expiryDate:daysAgo(-55)},
    {id:uid(), itemId:inventory[10].id, batchNo:'FD-2210', quantity:95, receivedDate:daysAgo(2), expiryDate:daysAgo(-3)},
    {id:uid(), itemId:inventory[4].id, batchNo:'RM-1187', quantity:310, receivedDate:daysAgo(30), expiryDate:daysAgo(-150)},
    {id:uid(), itemId:inventory[5].id, batchNo:'RM-1190', quantity:850, receivedDate:daysAgo(8), expiryDate:daysAgo(-30)},
    {id:uid(), itemId:inventory[0].id, batchNo:'FG-3050', quantity:184, receivedDate:daysAgo(2), expiryDate:daysAgo(-18)},
  ];
  const stockMovements = [
    {id:uid(), itemId:inventory[9].id, type:'Stock In', quantity:400, batchNo:'FD-2201', date:daysAgo(20), notes:'Monthly feed delivery'},
    {id:uid(), itemId:inventory[9].id, type:'Stock Out', quantity:180, batchNo:'FD-2201', date:daysAgo(6), notes:'Daily feeding — 2 weeks'},

/* ---------- Storage ---------- */
async function loadState(){
  try{
    const res = await window.storage.get(KEY, false);
    if(res && res.value){ STATE = JSON.parse(res.value); migrateState(); return; }
  }catch(e){ /* not found */ }
  STATE = seedData();
  await saveState();
}
function migrateState(){
  let changed = false;
  if(!STATE.monthlyStats){
    const now = new Date(); let cum = 42; const out=[];
    for(let i=5;i>=0;i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const newCust = 4+Math.floor(Math.random()*6);
      cum += (i===0?0:newCust);
      const revenue = 210000 + i*-8000 + Math.round(Math.random()*20000);
      out.push({month:d.toLocaleDateString('en-IN',{month:'short'}), revenue, sales:Math.round(revenue/220), newCustomers:newCust, totalCustomers:cum, production:32000+Math.round(Math.random()*3000)-i*400});
    }
    STATE.monthlyStats = out; changed = true;
  }
  if(!STATE.batches){
    STATE.inventory.forEach(i=>{
      if(i.category==='Finished Goods') i.category='Finished Products';
      if(i.category==='Raw Material') i.category='Raw Materials';
    });
    const feedItem = STATE.inventory.find(i=>i.category==='Feed') || STATE.inventory[0];
    STATE.batches = [
      {id:uid(), itemId:feedItem.id, batchNo:'FD-2201', quantity:feedItem.stock, receivedDate:daysAgo(10), expiryDate:daysAgo(-20)},
    ];
    STATE.stockMovements = [
      {id:uid(), itemId:feedItem.id, type:'Stock In', quantity:feedItem.stock, batchNo:'FD-2201', date:daysAgo(10), notes:'Initial stock'},
    ];
    changed = true;
  }
  if(!STATE.farms){
    STATE.farms = [
      {id:'farm-a', name:'Farm A', location:'Kochi, Kerala', capacity:2200, owner:'Roshan', manager:'Manoj Pillai'},
      {id:'farm-b', name:'Farm B', location:'Thrissur, Kerala', capacity:1400, owner:'Roshan', manager:'Rekha Suresh'},
      {id:'farm-c', name:'Farm C', location:'Kozhikode, Kerala', capacity:900, owner:'Roshan', manager:'Unassigned'},
    ];
    STATE.flocks.forEach((f,i)=>{ if(!f.farmId) f.farmId = i<3?'farm-a':'farm-b'; });
    STATE.feedSchedule.forEach(f=>{ if(!f.farmId) f.farmId = 'farm-a'; });
    STATE.healthRecords.forEach(h=>{ if(!h.farmId) h.farmId = 'farm-a'; });
    STATE.farmAssets = [
      {id:uid(), farmId:'farm-a', type:'Cage', name:'Battery cage row 1-6', quantity:6, status:'Good'},
      {id:uid(), farmId:'farm-a', type:'Equipment', name:'Automatic feeder line', quantity:2, status:'Good'},
      {id:uid(), farmId:'farm-a', type:'Birds/Livestock', name:'Layer hens (White Leghorn)', quantity:1000, status:'Good'},
      {id:uid(), farmId:'farm-a', type:'Production Unit', name:'Grading & packing unit', quantity:1, status:'Good'},
      {id:uid(), farmId:'farm-b', type:'Cage', name:'Battery cage row 1-4', quantity:4, status:'Good'},
      {id:uid(), farmId:'farm-b', type:'Birds/Livestock', name:'Layer hens (BV-380)', quantity:760, status:'Watch'},
      {id:uid(), farmId:'farm-c', type:'Cage', name:'Starter cage unit', quantity:2, status:'Good'},
      {id:uid(), farmId:'farm-c', type:'Birds/Livestock', name:'Pullets (BV-380)', quantity:180, status:'Good'},
    ];
    changed = true;
  }
  STATE.production.forEach(p=>{
    if(p.eggsProduced===undefined){
      const flock = STATE.flocks.find(f=>f.name===p.flock);
      p.farmId = p.farmId || (flock? flock.farmId : STATE.farms[0].id);
      p.breed = p.breed || (flock? flock.breed : 'Unknown');
      p.birdsCount = p.birdsCount || (flock? flock.headcount : 0);
      p.mortality = p.mortality!==undefined ? p.mortality : 0;
      p.brokenEggs = p.brokenEggs!==undefined ? p.brokenEggs : Math.round((p.quantity||0)*0.015);
      p.eggsProduced = p.quantity||0;
      p.productionPercentage = p.birdsCount ? +(p.eggsProduced/p.birdsCount*100).toFixed(1) : 0;
      p.qualityGrade = p.qualityGrade || 'A';
      p.createdBy = p.createdBy || 'Roshan';
      changed = true;
    }
  });
  if(STATE.customers.some(c=>!c.custId)){
    const locs = ['Kochi','Thrissur','Kozhikode','Ernakulam','Kollam'];
    const types = ['Premium','Subscription','Retail','B2B','Franchise'];
    STATE.customers.forEach((c,i)=>{
      if(!c.custId) c.custId = 'CUST-'+(1001+i);
      if(!c.address) c.address = (12+i)+' '+['MG Road','Marine Drive','Palace Road','Church Street','Beach Road'][i%5];
      if(!c.location) c.location = locs[i%locs.length];
      if(!c.customerType) c.customerType = types[i%types.length];
    });
    changed = true;
  }
  if(STATE.orders.some(o=>!o.channel || !ORDER_STAGES.includes(o.status))){
    const statusMap = {'Pending':'Order Created','Packed':'Packed','Delivered':'Delivered'};
    const CHANNELS_MIG = ['Website','WhatsApp','Mobile App','Sales Team'];
    STATE.orders.forEach((o,i)=>{
      if(!ORDER_STAGES.includes(o.status)) o.status = statusMap[o.status] || 'Order Created';
      if(!o.channel) o.channel = CHANNELS_MIG[i%CHANNELS_MIG.length];
    });
    changed = true;
  }
  if(!STATE.purchaseOrders){
    STATE.purchaseOrders = STATE.suppliers.map((s,i)=>({id:uid(), supplierId:s.id, poNumber:'PO-'+(5501+i), items:'Recent supply order', amount:s.outstanding||5000, status:'Received', date:s.lastOrder}));
    STATE.supplierPayments = STATE.suppliers.map(s=>({id:uid(), supplierId:s.id, amount:s.outstanding>0?0:2000, date:s.lastOrder, method:s.outstanding>0?'—':'Bank Transfer', status:s.outstanding>0?'Pending':'Paid'}));
    changed = true;
  }
  if(!STATE.complaints){ STATE.complaints = []; changed = true; }
  STATE.deliveries.forEach((d,i)=>{
    if(!d.zone){ d.zone = ['Zone A','Zone B','Zone C'][i%3]; changed = true; }
    if(d.codAmount===undefined){ d.codAmount = 0; d.codCollected = false; changed = true; }
  });
  if(changed) saveState();
}
async function saveState(){
  try{ await window.storage.set(KEY, JSON.stringify(STATE), false); }
  catch(e){ console.error('save failed', e); }
}
function showToast(msg){
  const t = document.getElementById('toast');

}

/* ---------- Notifications (computed) ---------- */
function computeNotifications(){
  const list = [];
  STATE.inventory.filter(i=>i.stock<=i.reorder).forEach(i=>
    list.push({id:'inv-'+i.id, type:'danger', title:'Low stock: '+i.item, sub:`${i.stock} ${i.unit} left, reorder at ${i.reorder}`}));
  STATE.payments.filter(p=>p.status==='Overdue').forEach(p=>
    list.push({id:'pay-'+p.id, type:'danger', title:'Overdue invoice: '+p.invoiceId, sub:`${p.customer} · ${fmtMoney(p.amount)}`}));
  STATE.customers.forEach(c=>{
    const daysSince = Math.floor((new Date()-new Date(c.lastOrder))/86400000);
    if(daysSince>30) list.push({id:'cust-'+c.id, type:'warn', title:c.name+' is at risk', sub:`No order in ${daysSince} days`});
  });
  STATE.deliveries.filter(d=>d.status==='Scheduled' && d.date<=daysAhead(1)).forEach(d=>
    list.push({id:'del-'+d.id, type:'warn', title:'Delivery due soon: '+d.customer, sub:`${fmtDate(d.date)} · ${d.route}`}));
  STATE.healthRecords.filter(h=>h.type==='Checkup' && h.notes.toLowerCase().includes('symptom')).forEach(h=>
    list.push({id:'health-'+h.id, type:'danger', title:h.flock+' flagged in health check', sub:h.notes}));
  return list.filter(n=>!STATE.dismissedNotifs.includes(n.id));
}
function renderBell(){
  const notifs = computeNotifications();
  document.getElementById('bell-dot').style.display = notifs.length ? 'block' : 'none';
}
function toggleNotifPanel(){
  notifOpen = !notifOpen;
  const root = document.getElementById('notif-root');
  if(!notifOpen){ root.innerHTML=''; return; }
  const notifs = computeNotifications();
  root.innerHTML = `<div class="notif-panel">
    ${notifs.length===0 ? '<div class="empty" style="padding:24px 10px;">All clear — no alerts right now.</div>' :
      notifs.map(n=>`<div class="notif-item">
        <div class="notif-dot" style="background:${n.type==='danger'?'var(--danger)':'var(--warn)'}"></div>
        <div class="notif-text"><b>${n.title}</b><span>${n.sub}</span></div>
      </div>`).join('')}
  </div>`;
}
document.addEventListener('click', (e)=>{
  if(notifOpen && !e.target.closest('.notif-panel') && !e.target.closest('#bell-btn')){
    notifOpen=false; document.getElementById('notif-root').innerHTML='';
  }
});

      g.className='nav-group-label'; g.textContent = m.group;
      nav.appendChild(g); return;
    }
    const b = document.createElement('button');
    b.className = 'nav-item' + (currentPage===m.id ? ' active':'');
    let extra = '';
    if(m.id==='notifications'){
      const n = computeNotifications().length;
      if(n) extra = `<span class="nbadge">${n}</span>`;
    }
    b.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor">${ICONS[m.icon]}</svg><span>${m.label}</span>${extra}`;
    b.onclick = ()=>navigate(m.id);
    nav.appendChild(b);
  });
}
function navigate(id){
  currentPage = id;
  document.getElementById('page-title').textContent = MODULES.find(m=>m.id===id).label;
  renderNav();
  render();
}

/* ---------- Modal helper ---------- */
function openModal(title, fieldsHtml, onSubmit){
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-backdrop" id="mb">
    <div class="modal">
      <h3>${title}</h3>
      <form id="modal-form">${fieldsHtml}
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="mb-cancel">Cancel</button>
          <button type="submit" class="btn btn-yolk">Save</button>
        </div>
      </form>
    </div>
  </div>`;
  document.getElementById('mb-cancel').onclick = ()=> root.innerHTML='';
  document.getElementById('mb').onclick = (e)=>{ if(e.target.id==='mb') root.innerHTML=''; };
  document.getElementById('modal-form').onsubmit = (e)=>{
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target).entries());
    onSubmit(data);
    root.innerHTML='';
  };
}

/* ---------- Chart helpers ---------- */
function destroyChart(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }
function lineChart(canvasId, labels, datasets){
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  charts[canvasId] = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets: datasets.map(d=>({...d, tension:0.35, fill:true, pointRadius:0, borderWidth:2})) },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display: datasets.length>1, labels:{font:{family:'IBM Plex Sans', size:11}}}},
      scales:{ x:{grid:{display:false}, ticks:{font:{family:'IBM Plex Mono', size:10}}},
               y:{grid:{color:'#EFE9D8'}, ticks:{font:{family:'IBM Plex Mono', size:10}}}} }
  });
}
function barChart(canvasId, labels, datasets, horizontal){
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  charts[canvasId] = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets },
    options:{ indexAxis: horizontal?'y':'x', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:datasets.length>1, labels:{font:{family:'IBM Plex Sans', size:11}}}},
      scales:{ x:{grid:{display:!horizontal, color:'#EFE9D8'}, ticks:{font:{family:'IBM Plex Mono', size:10}}},
               y:{grid:{display:horizontal, color:'#EFE9D8'}, ticks:{font:{family:'IBM Plex Mono', size:10}}}} }
  });
}
function doughnutChart(canvasId, labels, data, colors){
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  charts[canvasId] = new Chart(ctx, {
    type:'doughnut',
    data:{ labels, datasets:[{data, backgroundColor:colors, borderWidth:0}] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'68%',
      plugins:{legend:{position:'bottom', labels:{font:{family:'IBM Plex Sans', size:11}, boxWidth:10, padding:12}}} }
  });
}

/* ---------- Egg gauge (signature element) ---------- */
function eggGaugeSVG(pct){
  const clipH = 48 - (48*pct/100);
  return `<svg width="72" height="86" viewBox="0 0 40 48">
    <defs><clipPath id="eggclip"><path d="M20 2C11 14 4 26 4 34C4 42.3 11.2 46 20 46C28.8 46 36 42.3 36 34C36 26 29 14 20 2Z"/></clipPath></defs>
    <path d="M20 2C11 14 4 26 4 34C4 42.3 11.2 46 20 46C28.8 46 36 42.3 36 34C36 26 29 14 20 2Z" fill="#F2EEE2" stroke="#E3DDC9"/>
    <g clip-path="url(#eggclip)"><rect x="0" y="${clipH}" width="40" height="${48-clipH}" fill="#E8A93D"/></g>
    <path d="M20 2C11 14 4 26 4 34C4 42.3 11.2 46 20 46C28.8 46 36 42.3 36 34C36 26 29 14 20 2Z" fill="none" stroke="#C88A22" stroke-width="1"/>
  </svg>`;
}

function render(){
  const c = document.getElementById('content');
  const renderers = {
    dashboard: renderDashboard, farm: renderFarm, production: renderProduction, quality: renderQuality,
    inventory: renderInventory, products: renderProducts, crm: renderCRM, orders: renderOrders,
    subscriptions: renderSubscriptions, delivery: renderDelivery, payments: renderPayments,
    suppliers: renderSuppliers, employees: renderEmployees, analytics: renderAnalytics,
    notifications: renderNotifications, franchise: renderFranchise,
  };
  c.innerHTML = '';
  renderers[currentPage](c);
  renderBell(); renderNav();
}

function renderDashboard(c){
  const today = todayISO();
  const todayProd = STATE.production.filter(p=>p.date===today).reduce((s,p)=>s+p.quantity,0);
  const target = 1300;
  const pct = Math.min(100, Math.round(todayProd/target*100));

  // Business metrics
  const todayRevenue = STATE.payments.filter(p=>p.date===today && p.status==='Paid').reduce((s,p)=>s+p.amount,0);
  const thisMonth = today.slice(0,7);
  const monthlyRevenue = STATE.payments.filter(p=>p.date.slice(0,7)===thisMonth && p.status==='Paid').reduce((s,p)=>s+p.amount,0);
  const totalCustomers = STATE.customers.length;
  const activeSubs = STATE.subscriptions.filter(s=>s.status==='Active').length;
  const newCustomers = STATE.customers.filter(c=>c.joined>=daysAgo(30)).length;
  const atRisk = STATE.customers.filter(c=> Math.floor((new Date()-new Date(c.lastOrder))/86400000) > 30).length;
  const retentionRate = totalCustomers ? Math.round((totalCustomers-atRisk)/totalCustomers*100) : 0;
  const pendingPayments = STATE.payments.filter(p=>p.status==='Pending'||p.status==='Overdue').reduce((s,p)=>s+p.amount,0);

  // Farm metrics
  const last30total = STATE.production.filter(p=>p.date>=daysAgo(29)).reduce((s,p)=>s+p.quantity,0);
  const eggsSoldToday = STATE.orders.filter(o=>o.date===today).reduce((s,o)=>s+(o.qty||1)*12,0);
  const finishedGoodsStock = STATE.inventory.filter(i=>i.category==='Finished Products').reduce((s,i)=>s+i.stock,0);
  const qRows = STATE.quality;
  const qTotal = qRows.reduce((s,r)=>s+r.gradeA+r.gradeB+r.gradeC+r.rejected,0);
  const wastagePct = qTotal ? (qRows.reduce((s,r)=>s+r.rejected,0)/qTotal*100).toFixed(1) : '0.0';
  const feedToday = STATE.production.filter(p=>p.date===today).reduce((s,p)=>s+p.feedKg,0);

  // Delivery metrics
  const pendingDeliveries = STATE.deliveries.filter(d=>d.status==='Scheduled'||d.status==='Out for delivery').length;
  const completedDeliveries = STATE.deliveries.filter(d=>d.status==='Delivered').length;
  const failedDeliveries = STATE.deliveries.filter(d=>d.status==='Failed').length;
  const deliveryCost = STATE.deliveries.reduce((s,d)=>s+(d.cost||0),0);

  const last14dates = [...Array(14)].map((_,i)=>daysAgo(13-i));
  const prodByDay = last14dates.map(d=> STATE.production.filter(p=>p.date===d).reduce((s,p)=>s+p.quantity,0));
  const ms = STATE.monthlyStats;

  c.innerHTML = `
    <div class="card-head" style="margin-bottom:6px;"><h3 class="card-title" style="font-size:13px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft);">Business Metrics</h3></div>
    <div class="grid grid-4">
      <div class="stat-card"><div class="stat-label">Today's Revenue</div><div class="stat-value">${fmtMoney(todayRevenue)}</div></div>
      <div class="stat-card"><div class="stat-label">Monthly Revenue</div><div class="stat-value">${fmtMoney(monthlyRevenue)}</div></div>
      <div class="stat-card"><div class="stat-label">Total Customers</div><div class="stat-value">${totalCustomers}</div></div>
      <div class="stat-card"><div class="stat-label">Active Subscribers</div><div class="stat-value">${activeSubs}</div></div>
      <div class="stat-card"><div class="stat-label">New Customers (30d)</div><div class="stat-value up">${newCustomers}</div></div>
      <div class="stat-card"><div class="stat-label">Retention Rate</div><div class="stat-value ${retentionRate<70?'down':'up'}">${retentionRate}%</div></div>
      <div class="stat-card"><div class="stat-label">Pending Payments</div><div class="stat-value ${pendingPayments>0?'down':''}">${fmtMoney(pendingPayments)}</div></div>
    </div>

    <div class="card-head" style="margin:22px 0 6px 0;"><h3 class="card-title" style="font-size:13px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft);">Farm Metrics</h3></div>
    <div class="grid grid-4">
      <div class="stat-card"><div class="stat-label">Total Production (30d)</div><div class="stat-value">${last30total.toLocaleString('en-IN')}</div></div>
      <div class="stat-card"><div class="stat-label">Eggs Produced Today</div><div class="stat-value">${todayProd}</div></div>
      <div class="stat-card"><div class="stat-label">Eggs Sold Today (est.)</div><div class="stat-value">${eggsSoldToday}</div></div>
      <div class="stat-card"><div class="stat-label">Inventory Available</div><div class="stat-value">${finishedGoodsStock}</div><div class="stat-delta">finished-goods units</div></div>
      <div class="stat-card"><div class="stat-label">Wastage %</div><div class="stat-value ${wastagePct>3?'down':'up'}">${wastagePct}%</div></div>
      <div class="stat-card"><div class="stat-label">Feed Consumption Today</div><div class="stat-value">${feedToday}<span style="font-size:13px; font-weight:400; color:var(--ink-soft);"> kg</span></div></div>
    </div>

    <div class="card-head" style="margin:22px 0 6px 0;"><h3 class="card-title" style="font-size:13px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft);">Delivery Metrics</h3></div>

      <div class="stat-card"><div class="stat-label">Completed Deliveries</div><div class="stat-value up">${completedDeliveries}</div></div>
      <div class="stat-card"><div class="stat-label">Failed Deliveries</div><div class="stat-value ${failedDeliveries?'down':''}">${failedDeliveries}</div></div>
      <div class="stat-card"><div class="stat-label">Delivery Cost</div><div class="stat-value">${fmtMoney(deliveryCost)}</div></div>
    </div>

    <div class="card-head" style="margin:22px 0 6px 0;"><h3 class="card-title" style="font-size:13px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft);">Analytics</h3></div>
    <div class="grid grid-4" style="grid-template-columns:repeat(2,1fr);">
      <div class="card"><div class="card-head"><h3 class="card-title">Monthly Sales<small>Units sold, last 6 months</small></h3></div><div style="height:200px;"><canvas id="chart-monthly-sales"></canvas></div></div>
      <div class="card"><div class="card-head"><h3 class="card-title">Customer Growth<small>Cumulative customers</small></h3></div><div style="height:200px;"><canvas id="chart-customer-growth"></canvas></div></div>
      <div class="card"><div class="card-head"><h3 class="card-title">Production Trend<small>Eggs, last 14 days</small></h3></div><div style="height:200px;"><canvas id="chart-prod-trend"></canvas></div></div>
      <div class="card"><div class="card-head"><h3 class="card-title">Revenue Growth<small>Last 6 months</small></h3></div><div style="height:200px;"><canvas id="chart-revenue-growth"></canvas></div></div>
    </div>

    <div class="card" style="margin-top:20px;">
      <div class="card-head"><h3 class="card-title">Today's Lay<small>${fmtDate(today)} · target ${target}</small></h3></div>
      <div class="egg-gauge-wrap">
        ${eggGaugeSVG(pct)}
        <div>
          <div style="font-size:28px; font-weight:600; font-family:'Space Grotesk';">${todayProd}<span style="font-size:14px; color:var(--ink-soft); font-weight:400;"> / ${target}</span></div>
          <div style="font-size:12px; color:var(--ink-soft); margin-top:2px;">${pct}% of daily target</div>
          <div class="flock-dots">
            ${['Flock A','Flock B','Flock C','Flock D'].map(f=>{
              const q = STATE.production.find(p=>p.date===today && p.flock===f);
              const cls = !q ? 'danger' : (q.quantity < 250 ? 'warn':'');
              return `<span class="flock-dot ${cls}" title="${f}"></span>`;
            }).join('')}

        </div>
      </div>

    <div class="card">
      <div class="card-head"><h3 class="card-title">Needs Attention<small>Top alerts across the platform</small></h3></div>
      ${computeNotifications().length===0 ? '<div class="empty" style="padding:20px;">Nothing urgent right now.</div>' :

    </div>
  `;
  barChart('chart-monthly-sales', ms.map(m=>m.month), [{label:'Units sold', data:ms.map(m=>m.sales), backgroundColor:'#E8A93D'}]);
  lineChart('chart-customer-growth', ms.map(m=>m.month), [{label:'Customers', data:ms.map(m=>m.totalCustomers), borderColor:'#4C7A5C', backgroundColor:'rgba(76,122,92,0.12)'}]);

}

/* ---- Production ---- */
function renderProduction(c){
  const rows = [...STATE.production].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,60);
  const last14 = [...Array(14)].map((_,i)=>daysAgo(13-i));
  const byFlock = {};
  ['Flock A','Flock B','Flock C','Flock D'].forEach(f=>{
    byFlock[f] = last14.map(d=>{ const r = STATE.production.find(p=>p.flock===f && p.date===d); return r? r.quantity:0; });
  });
  const avgPct = rows.length ? (rows.reduce((s,r)=>s+(r.productionPercentage||0),0)/rows.length).toFixed(1) : '0.0';
  const totalMortality = rows.reduce((s,r)=>s+(r.mortality||0),0);
  const totalBroken = rows.reduce((s,r)=>s+(r.brokenEggs||0),0);

  c.innerHTML = `
    <div class="grid grid-3">
      <div class="stat-card"><div class="stat-label">Avg. Production %</div><div class="stat-value ${avgPct<80?'down':'up'}">${avgPct}%</div><div class="stat-delta">eggs per bird, recent logs</div></div>
      <div class="stat-card"><div class="stat-label">Mortality (recent logs)</div><div class="stat-value ${totalMortality?'down':''}">${totalMortality}</div><div class="stat-delta">birds lost</div></div>
      <div class="stat-card"><div class="stat-label">Broken Eggs (recent logs)</div><div class="stat-value">${totalBroken}</div><div class="stat-delta">quality loss</div></div>
    </div>
    <div class="card">
      <div class="card-head"><h3 class="card-title">Production trend<small>Eggs laid per flock, last 14 days</small></h3></div>
      <div style="height:230px;"><canvas id="chart-flock-trend"></canvas></div>
    </div>
    <div class="card">
      <div class="toolbar"><h3 class="card-title" style="margin:0;">Daily production log<small style="font-weight:400;">Input: bird count, breed, feed, mortality — Output: eggs, grade, quality</small></h3><button class="btn btn-yolk" id="add-prod">+ Log production</button></div>
      <table><thead><tr><th>Date</th><th>Farm</th><th>Flock</th><th>Breed</th><th>Birds</th><th>Feed (kg)</th><th>Mortality</th><th>Prod. %</th><th>Eggs</th><th>Broken</th><th>Grade</th><th>Logged by</th><th></th></tr></thead>
      <tbody>${rows.map(r=>{
        const farmName = STATE.farms.find(f=>f.id===r.farmId)?.name || '—';
        return `<tr><td class="mono">${fmtDate(r.date)}</td><td>${farmName}</td><td>${r.flock}</td><td style="color:var(--ink-soft);">${r.breed||'—'}</td>
        <td class="mono">${r.birdsCount||'—'}</td><td class="mono">${r.feedKg}</td>
        <td class="mono ${r.mortality?'down':''}">${r.mortality||0}</td><td class="mono">${r.productionPercentage||'—'}%</td>
        <td class="mono">${r.eggsProduced ?? r.quantity}</td><td class="mono">${r.brokenEggs||0}</td>
        <td><span class="badge ${r.qualityGrade==='A'?'badge-ok':'badge-warn'}">${r.qualityGrade||'—'}</span></td>
        <td style="font-size:12px; color:var(--ink-soft);">${r.createdBy||'—'}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="deleteRow('production','${r.id}')">Remove</button></td></tr>`;
      }).join('')}</tbody></table>
    </div>
  `;
  lineChart('chart-flock-trend', last14.map(fmtDate), Object.entries(byFlock).map(([f,data],i)=>({
    label:f, data, borderColor:['#E8A93D','#4C7A5C','#BE5A3B','#8C9A85'][i], backgroundColor:'transparent', fill:false
  })));
  document.getElementById('add-prod').onclick = ()=>{
    openModal('Log production', `
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft); font-family:'IBM Plex Mono'; margin-bottom:8px;">Input</div>
      <div class="form-row">
        <div><label>Date</label><input type="date" name="date" value="${todayISO()}" required></div>
        <div><label>Farm</label><select name="farmId">${STATE.farms.map(f=>`<option value="${f.id}">${f.name}</option>`).join('')}</select></div>
      </div>
      <div class="form-row">
        <div><label>Flock</label><select name="flock">${STATE.flocks.map(f=>`<option value="${f.name}" data-breed="${f.breed}" data-birds="${f.headcount}">${f.name}</option>`).join('')}</select></div>
        <div><label>Bird count</label><input type="number" name="birdsCount" required></div>
      </div>
      <div class="form-row">
        <div><label>Breed</label><input name="breed" required></div>
        <div><label>Feed consumption (kg)</label><input type="number" name="feedKg" required></div>
        <div><label>Mortality</label><input type="number" name="mortality" value="0" required></div>
      </div>
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft); font-family:'IBM Plex Mono'; margin:14px 0 8px 0;">Output</div>
      <div class="form-row">
        <div><label>Eggs produced</label><input type="number" name="eggsProduced" required></div>
        <div><label>Broken eggs</label><input type="number" name="brokenEggs" value="0" required></div>
        <div><label>Quality grade</label><select name="qualityGrade"><option>A</option><option>B</option><option>C</option></select></div>
      </div>
    `, async (d)=>{
      const eggsProduced = Number(d.eggsProduced);
      const birdsCount = Number(d.birdsCount);
      const productionPercentage = birdsCount ? +(eggsProduced/birdsCount*100).toFixed(1) : 0;
      STATE.production.push({
        id:uid(), farmId:d.farmId, date:d.date, flock:d.flock, breed:d.breed,
        birdsCount, feedKg:Number(d.feedKg), mortality:Number(d.mortality),
        eggsProduced, brokenEggs:Number(d.brokenEggs), qualityGrade:d.qualityGrade, productionPercentage,
        createdBy:'Roshan', quantity:eggsProduced,
      });
      await saveState(); showToast('Production logged'); render();
    });
  };
}

/* ---- Quality ---- */
function renderQuality(c){
  const rows = [...STATE.quality].sort((a,b)=>b.date.localeCompare(a.date));
  const totalGraded = rows.reduce((s,r)=>s+r.gradeA+r.gradeB+r.gradeC+r.rejected,0);
  const totalRejected = rows.reduce((s,r)=>s+r.rejected,0);
  const rejectRate = totalGraded? (totalRejected/totalGraded*100).toFixed(1) : '0.0';
  c.innerHTML = `
    <div class="grid grid-3">
      <div class="stat-card"><div class="stat-label">Rejection Rate</div><div class="stat-value ${rejectRate>3?'down':'up'}">${rejectRate}%</div><div class="stat-delta">last ${rows.length} batches</div></div>
      <div class="stat-card"><div class="stat-label">Grade A Share</div><div class="stat-value">${totalGraded? Math.round(rows.reduce((s,r)=>s+r.gradeA,0)/totalGraded*100):0}%</div><div class="stat-delta">of graded volume</div></div>
      <div class="stat-card"><div class="stat-label">Batches Logged</div><div class="stat-value">${rows.length}</div><div class="stat-delta">inspection records</div></div>
    </div>
    <div class="card"><div class="card-head"><h3 class="card-title">Grade distribution<small>Recent batches</small></h3></div><div style="height:220px;"><canvas id="chart-grade"></canvas></div></div>
    <div class="card">
      <div class="toolbar"><h3 class="card-title" style="margin:0;">Inspection log</h3><button class="btn btn-yolk" id="add-qc">+ Log inspection</button></div>
      <table><thead><tr><th>Batch</th><th>Date</th><th>Grade A</th><th>Grade B</th><th>Grade C</th><th>Rejected</th><th>Notes</th></tr></thead>
      <tbody>${rows.map(r=>`<tr><td class="mono">${r.batch}</td><td class="mono">${fmtDate(r.date)}</td><td>${r.gradeA}</td><td>${r.gradeB}</td><td>${r.gradeC}</td><td class="${r.rejected/(r.gradeA+r.gradeB+r.gradeC+r.rejected||1)>0.035?'down':''}">${r.rejected}</td><td style="max-width:220px; font-size:12px; color:var(--ink-soft);">${r.notes}</td></tr>`).join('')}</tbody></table>
    </div>
    <div class="card">
      <div class="toolbar"><h3 class="card-title" style="margin:0;">Customer complaints</h3><button class="btn btn-yolk" id="add-complaint">+ Log complaint</button></div>
      ${STATE.complaints.length===0 ? '<div class="empty">No complaints logged.</div>' :
      `<table><thead><tr><th>Customer</th><th>Batch</th><th>Issue</th><th>Date</th><th>Status</th><th></th></tr></thead>
      <tbody>${[...STATE.complaints].sort((a,b)=>b.date.localeCompare(a.date)).map(cx=>`<tr><td>${cx.customer}</td><td class="mono">${cx.batch||'—'}</td><td>${cx.issue}</td><td class="mono">${fmtDate(cx.date)}</td>
        <td><span class="badge ${cx.status==='Resolved'?'badge-ok':'badge-warn'}">${cx.status}</span></td>
        <td>${cx.status!=='Resolved'?`<button class="btn btn-ghost btn-sm" onclick="resolveComplaint('${cx.id}')">Resolve</button>`:''}</td></tr>`).join('')}</tbody></table>`}
    </div>
  `;
  const recent = rows.slice(0,10).reverse();
  barChart('chart-grade', recent.map(r=>r.batch), [
    {label:'Grade A', data:recent.map(r=>r.gradeA), backgroundColor:'#4C7A5C'},
    {label:'Grade B', data:recent.map(r=>r.gradeB), backgroundColor:'#E8A93D'},
    {label:'Grade C', data:recent.map(r=>r.gradeC), backgroundColor:'#8C9A85'},
    {label:'Rejected', data:recent.map(r=>r.rejected), backgroundColor:'#BE5A3B'},
  ]);
  document.getElementById('add-qc').onclick = ()=>{
    openModal('Log inspection', `
      <div class="form-row"><div><label>Batch ID</label><input name="batch" placeholder="B-1042" required></div><div><label>Date</label><input type="date" name="date" value="${todayISO()}" required></div></div>
      <div class="form-row"><div><label>Grade A</label><input type="number" name="gradeA" required></div><div><label>Grade B</label><input type="number" name="gradeB" required></div><div><label>Grade C</label><input type="number" name="gradeC" required></div><div><label>Rejected</label><input type="number" name="rejected" required></div></div>
      <div><label>Notes</label><textarea name="notes" rows="2"></textarea></div>
    `, async (d)=>{
      STATE.quality.push({id:uid(), batch:d.batch, date:d.date, gradeA:+d.gradeA, gradeB:+d.gradeB, gradeC:+d.gradeC, rejected:+d.rejected, notes:d.notes||'—'});
      await saveState(); showToast('Inspection logged'); render();
    });
  };
  document.getElementById('add-complaint').onclick = ()=>{
    openModal('Log customer complaint', `
      <div class="form-row"><div><label>Customer</label><input name="customer" required></div><div><label>Batch number</label><input name="batch" placeholder="Optional"></div></div>
      <div><label>Issue</label><textarea name="issue" rows="2" required></textarea></div>
      <div style="margin-top:12px;"><label>Date</label><input type="date" name="date" value="${todayISO()}" required></div>
    `, async (d)=>{
      STATE.complaints.push({id:uid(), customer:d.customer, batch:d.batch||'—', issue:d.issue, date:d.date, status:'Open'});
      await saveState(); showToast('Complaint logged'); render();
    });
  };
}
window.resolveComplaint = async (id)=>{
  const cx = STATE.complaints.find(x=>x.id===id);
  cx.status = 'Resolved';
  await saveState(); showToast('Complaint marked resolved'); render();
};

/* ---- Inventory ---- */
const INV_CATEGORIES = ['Raw Materials','Finished Products','Packaging','Feed','Equipment'];
let selectedInvCategory = 'All';
function renderInventory(c){
  let rows = [...STATE.inventory];
  if(selectedInvCategory!=='All') rows = rows.filter(r=>r.category===selectedInvCategory);
  rows.sort((a,b)=> (a.stock<=a.reorder)===(b.stock<=b.reorder) ? 0 : (a.stock<=a.reorder? -1:1));

  const lowStockCount = STATE.inventory.filter(i=>i.stock<=i.reorder).length;
  const expiringSoon = STATE.batches.filter(b=>b.expiryDate<=daysAhead(7) && b.expiryDate>=todayISO());
  const expired = STATE.batches.filter(b=>b.expiryDate<todayISO());

  c.innerHTML = `
    <div class="grid grid-3">
      <div class="stat-card"><div class="stat-label">Total Items Tracked</div><div class="stat-value">${STATE.inventory.length}</div></div>
      <div class="stat-card"><div class="stat-label">Low Stock Alerts</div><div class="stat-value ${lowStockCount?'down':''}">${lowStockCount}</div></div>
      <div class="stat-card"><div class="stat-label">Batches Expiring / Expired</div><div class="stat-value ${(expiringSoon.length+expired.length)?'down':''}">${expiringSoon.length} / ${expired.length}</div></div>
    </div>

    <div class="card">
      <div class="toolbar">
        <h3 class="card-title" style="margin:0;">Stock levels</h3>
        <button class="btn btn-yolk" id="add-inv">+ Add item</button>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;">
        <button class="btn ${selectedInvCategory==='All'?'btn-yolk':'btn-ghost'} btn-sm" onclick="selectInvCategory('All')">All</button>
        ${INV_CATEGORIES.map(cat=>`<button class="btn ${selectedInvCategory===cat?'btn-yolk':'btn-ghost'} btn-sm" onclick="selectInvCategory('${cat}')">${cat}</button>`).join('')}
      </div>
      <table><thead><tr><th>Item</th><th>Category</th><th>Stock</th><th>Reorder at</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows.map(r=>{
        const low = r.stock<=r.reorder;
        return `<tr><td>${r.item}</td><td style="color:var(--ink-soft);">${r.category}</td><td class="mono">${r.stock} ${r.unit}</td><td class="mono">${r.reorder}</td>
        <td><span class="badge ${low?'badge-danger':'badge-ok'}">${low?'Reorder now':'Healthy'}</span></td>
        <td><button class="btn btn-ghost btn-sm" onclick="deleteRow('inventory','${r.id}')">Remove</button></td></tr>`;
      }).join('')}</tbody></table>
    </div>

    <div class="card">
      <div class="toolbar"><h3 class="card-title" style="margin:0;">Stock movements<small style="font-weight:400;">Stock in / stock out ledger</small></h3><button class="btn btn-yolk" id="add-movement">+ Record movement</button></div>
      <table><thead><tr><th>Date</th><th>Item</th><th>Type</th><th>Quantity</th><th>Batch</th><th>Notes</th></tr></thead>
      <tbody>${[...STATE.stockMovements].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20).map(m=>{
        const item = STATE.inventory.find(i=>i.id===m.itemId);
        return `<tr><td class="mono">${fmtDate(m.date)}</td><td>${item?item.item:'—'}</td>
        <td><span class="badge ${m.type==='Stock In'?'badge-ok':'badge-neutral'}">${m.type}</span></td>
        <td class="mono">${m.quantity}</td><td class="mono">${m.batchNo||'—'}</td><td style="font-size:12px; color:var(--ink-soft);">${m.notes||'—'}</td></tr>`;
      }).join('')}</tbody></table>
    </div>

    <div class="card">
      <div class="card-head"><h3 class="card-title">Batch &amp; expiry tracking<small>Sorted by expiry date</small></h3></div>
      <table><thead><tr><th>Batch</th><th>Item</th><th>Quantity</th><th>Received</th><th>Expiry</th><th>Status</th></tr></thead>
      <tbody>${[...STATE.batches].sort((a,b)=>a.expiryDate.localeCompare(b.expiryDate)).map(b=>{
        const item = STATE.inventory.find(i=>i.id===b.itemId);
        const isExpired = b.expiryDate<todayISO();
        const isSoon = !isExpired && b.expiryDate<=daysAhead(7);
        return `<tr><td class="mono">${b.batchNo}</td><td>${item?item.item:'—'}</td><td class="mono">${b.quantity}</td>
        <td class="mono">${fmtDate(b.receivedDate)}</td><td class="mono">${fmtDate(b.expiryDate)}</td>
        <td><span class="badge ${isExpired?'badge-danger':isSoon?'badge-warn':'badge-ok'}">${isExpired?'Expired':isSoon?'Expiring soon':'Good'}</span></td></tr>`;
      }).join('')}</tbody></table>
    </div>
  `;
  document.getElementById('add-inv').onclick = ()=>{
    openModal('Add inventory item', `
      <div class="form-row"><div><label>Item name</label><input name="item" required></div><div><label>Category</label><select name="category">${INV_CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select></div></div>
      <div class="form-row"><div><label>Current stock</label><input type="number" name="stock" required></div><div><label>Unit</label><input name="unit" placeholder="packs / kg / pcs" required></div><div><label>Reorder level</label><input type="number" name="reorder" required></div></div>
    `, async (d)=>{
      STATE.inventory.push({id:uid(), item:d.item, category:d.category, stock:+d.stock, unit:d.unit, reorder:+d.reorder});
      await saveState(); showToast('Item added'); render();
    });
  };
  document.getElementById('add-movement').onclick = ()=>{
    openModal('Record stock movement', `
      <div class="form-row">
        <div><label>Item</label><select name="itemId">${STATE.inventory.map(i=>`<option value="${i.id}">${i.item}</option>`).join('')}</select></div>
        <div><label>Type</label><select name="type"><option>Stock In</option><option>Stock Out</option></select></div>
      </div>
      <div class="form-row">
        <div><label>Quantity</label><input type="number" name="quantity" required></div>
        <div><label>Batch number</label><input name="batchNo" placeholder="Optional"></div>
        <div><label>Date</label><input type="date" name="date" value="${todayISO()}" required></div>
      </div>
      <div><label>Notes</label><input name="notes" placeholder="Optional"></div>
    `, async (d)=>{
      const qty = Number(d.quantity);
      const item = STATE.inventory.find(i=>i.id===d.itemId);
      if(item) item.stock += (d.type==='Stock In' ? qty : -qty);
      STATE.stockMovements.push({id:uid(), itemId:d.itemId, type:d.type, quantity:qty, batchNo:d.batchNo||'—', date:d.date, notes:d.notes||''});
      await saveState(); showToast('Movement recorded'); render();
    });
  };
}
window.selectInvCategory = (cat)=>{ selectedInvCategory = cat; render(); };

/* ---- Product Management ---- */
function renderProducts(c){

  c.innerHTML = `
    <div class="card">
      <div class="toolbar"><h3 class="card-title" style="margin:0;">Product catalog</h3><button class="btn btn-yolk" id="add-product">+ Add product</button></div>
      <table><thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows.map(p=>`<tr><td>${p.name}</td><td style="color:var(--ink-soft);">${p.category}</td><td class="mono">${fmtMoney(p.price)}</td>
        <td><span class="badge ${p.active?'badge-ok':'badge-neutral'}">${p.active?'Active':'Inactive'}</span></td>
        <td><button class="btn btn-ghost btn-sm" onclick="toggleProduct('${p.id}')">${p.active?'Deactivate':'Activate'}</button></td></tr>`).join('')}</tbody></table>
    </div>
  `;
  document.getElementById('add-product').onclick = ()=>{
    openModal('Add product', `
      <div class="form-row"><div><label>Product name</label><input name="name" required></div><div><label>Category</label><select name="category"><option>Retail Pack</option><option>Bulk</option><option>Specialty</option></select></div></div>
      <div><label>Price (₹)</label><input type="number" name="price" required></div>
    `, async (d)=>{
      STATE.products.push({id:uid(), name:d.name, category:d.category, price:+d.price, active:true});
      await saveState(); showToast('Product added'); render();

}
window.toggleProduct = async (id)=>{
  const p = STATE.products.find(x=>x.id===id); p.active = !p.active;
  await saveState(); render();
};

/* ---- CRM ---- */
const CUSTOMER_SEGMENTS = ['Premium','Subscription','Retail','B2B','Franchise'];
let selectedSegment = 'All';

  const stages = ['New','Contacted','Converted','Lost'];

  let custRows = [...STATE.customers];
  if(selectedSegment!=='All') custRows = custRows.filter(cu=>cu.customerType===selectedSegment);

  c.innerHTML = `
    <div class="card">
      <div class="card-head"><h3 class="card-title">Customer segmentation<small>Click a segment to filter the profile table below</small></h3></div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn ${selectedSegment==='All'?'btn-yolk':'btn-ghost'} btn-sm" onclick="selectSegment('All')">All (${STATE.customers.length})</button>
        ${CUSTOMER_SEGMENTS.map(seg=>`<button class="btn ${selectedSegment===seg?'btn-yolk':'btn-ghost'} btn-sm" onclick="selectSegment('${seg}')">${seg} (${STATE.customers.filter(cu=>cu.customerType===seg).length})</button>`).join('')}
      </div>
    </div>

    <div class="card">
      <div class="toolbar"><h3 class="card-title" style="margin:0;">Customer profiles</h3><button class="btn btn-yolk" id="add-customer">+ Add customer</button></div>

      <tbody>${custRows.map(cu=>{
        const sub = STATE.subscriptions.find(s=>s.customer===cu.name);

          <td class="mono">${cu.custId}</td>
          <td>${cu.name}<div style="font-size:11px; color:var(--ink-soft);">${cu.address}</div></td>
          <td class="mono">${cu.phone}</td>
          <td>${cu.location}</td>
          <td><span class="badge ${cu.customerType==='Premium'?'badge-warn':cu.customerType==='Franchise'?'badge-danger':cu.customerType==='B2B'?'badge-neutral':'badge-ok'}">${cu.customerType}</span></td>
          <td class="mono">${cu.totalOrders} orders · ${fmtMoney(cu.totalSpent)}</td>
          <td>${sub ? `<span class="badge ${sub.status==='Active'?'badge-ok':sub.status==='Paused'?'badge-warn':'badge-danger'}">${sub.status}</span>` : '<span class="badge badge-neutral">None</span>'}</td>
          <td style="font-size:12.5px; ${overdue?'color:var(--danger);':''}">${paymentSummary}</td>
        </tr>`;
      }).join('')}</tbody></table>
    </div>

    <div class="card">
      <div class="pipeline">${stages.map(s=>`<div class="pipeline-stage"><div class="n">${rows.filter(r=>r.stage===s).length}</div><div class="l">${s}</div></div>`).join('')}</div>
    </div>
    <div class="card">
      <div class="toolbar"><h3 class="card-title" style="margin:0;">Leads &amp; contacts</h3><button class="btn btn-yolk" id="add-lead">+ Add lead</button></div>
      <table><thead><tr><th>Name</th><th>Phone</th><th>Source</th><th>Last contact</th><th>Stage</th><th>Notes</th></tr></thead>

  c.innerHTML = `
    <div class="card">
      <div class="card-head"><h3 class="card-title">Delivery zones<small>Coverage areas</small></h3></div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        ${DELIVERY_ZONES.map(z=>`<div class="pipeline-stage" style="flex:none; min-width:140px;"><div class="n">${rows.filter(r=>r.zone===z).length}</div><div class="l">${z}</div></div>`).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-head"><h3 class="card-title">Driver app<small>Today's route, per driver</small></h3></div>
      ${drivers.map(drv=>{
        const stops = todaysDeliveries.filter(d=>d.driver===drv);

        return `<div style="margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--paper-dim);">
          <div style="font-weight:600; font-family:'Space Grotesk'; margin-bottom:8px;">${drv} <span style="font-weight:400; font-size:12px; color:var(--ink-soft);">· ${stops.length} stop${stops.length>1?'s':''} today</span></div>
          <table><thead><tr><th>Customer</th><th>Zone</th><th>Navigate</th><th>Status</th><th>Payment collection</th></tr></thead>
          <tbody>${stops.map(s=>`<tr><td>${s.customer}</td><td>${s.zone}</td>
            <td><a href="https://www.google.com/maps/search/${encodeURIComponent(s.zone+' Kochi')}" target="_blank" style="color:var(--forest); text-decoration:underline;">Open map</a></td>
            <td><span class="badge ${s.status==='Delivered'?'badge-ok':s.status==='Out for delivery'?'badge-warn':'badge-neutral'}">${s.status}</span></td>
            <td>${s.codAmount>0 ? `${fmtMoney(s.codAmount)} <span class="badge ${s.codCollected?'badge-ok':'badge-warn'}">${s.codCollected?'Collected':'Pending'}</span>` : '<span style="color:var(--ink-soft); font-size:12px;">Prepaid</span>'}</td>
            </tr>`).join('')}</tbody></table>
        </div>`;

      <div style="font-size:13px; color:var(--ink-soft); margin-top:8px;">Future integration: live Google Maps API navigation and automatic route optimization across zones, rather than the manual map links used today.</div>
    </div>

    <div class="card">
      <div class="toolbar"><h3 class="card-title" style="margin:0;">Delivery schedule</h3><button class="btn btn-yolk" id="add-del">+ Schedule delivery</button></div>
      <table><thead><tr><th>Date</th><th>Customer</th><th>Zone</th><th>Driver</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows.map(r=>`<tr><td class="mono">${fmtDate(r.date)}</td><td>${r.customer}</td><td>${r.zone}</td><td>${r.driver}</td>
        <td><span class="badge ${r.status==='Delivered'?'badge-ok':r.status==='Out for delivery'?'badge-warn':r.status==='Failed'?'badge-danger':'badge-neutral'}">${r.status}</span></td>

    </div>

    openModal('Schedule delivery', `
      <div class="form-row"><div><label>Customer</label><input name="customer" required></div><div><label>Date</label><input type="date" name="date" value="${daysAhead(1)}" required></div></div>

      <div><label>COD amount to collect (₹, 0 if prepaid)</label><input type="number" name="codAmount" value="0" required></div>
    `, async (d)=>{
      STATE.deliveries.push({id:uid(), date:d.date, customer:d.customer, zone:d.zone, driver:d.driver, status:'Scheduled', cost:100, codAmount:+d.codAmount, codCollected:false});

/* ---- Payment & Accounting ---- */
function renderPayments(c){
  const rows = [...STATE.payments].sort((a,b)=>b.date.localeCompare(a.date));
  const expenses = [...STATE.expenses].sort((a,b)=>b.date.localeCompare(a.date));

  const pending = rows.filter(r=>r.status==='Pending').reduce((s,r)=>s+r.amount,0);
  const overdue = rows.filter(r=>r.status==='Overdue').reduce((s,r)=>s+r.amount,0);
  const totalExpenses = expenses.reduce((s,e)=>s+e.amount,0);
  const supplierOutstanding = STATE.suppliers.reduce((s,sup)=>s+sup.outstanding,0);
  const netProfit = paid - totalExpenses;

  const today = todayISO();
  const todayOrders = STATE.orders.filter(o=>o.date===today);
  const todaySales = todayOrders.reduce((s,o)=>s+o.total,0);

  c.innerHTML = `

      <div class="stat-card"><div class="stat-label">Net Profit (collected − expenses)</div><div class="stat-value ${netProfit<0?'down':'up'}">${fmtMoney(netProfit)}</div></div>

          <tr><td>Orders today</td><td class="mono" style="text-align:right;">${todayOrders.length}</td></tr>
          <tr><td>Sales value</td><td class="mono" style="text-align:right;">${fmtMoney(todaySales)}</td></tr>
          <tr><td>Avg. order value</td><td class="mono" style="text-align:right;">${fmtMoney(todayOrders.length? todaySales/todayOrders.length:0)}</td></tr>
        </table>
      </div>
      <div class="card">
        <div class="card-head"><h3 class="card-title">Monthly Profit Report<small>${STATE.monthlyStats[STATE.monthlyStats.length-1].month}</small></h3></div>
        <table>
          <tr><td>Revenue</td><td class="mono" style="text-align:right;">${fmtMoney(STATE.monthlyStats[STATE.monthlyStats.length-1].revenue)}</td></tr>
          <tr><td>Expenses (all-time logged)</td><td class="mono" style="text-align:right;">${fmtMoney(totalExpenses)}</td></tr>
          <tr><td>Est. profit</td><td class="mono" style="text-align:right;">${fmtMoney(STATE.monthlyStats[STATE.monthlyStats.length-1].revenue - totalExpenses)}</td></tr>
        </table>
      </div>
      <div class="card">
        <div class="card-head"><h3 class="card-title">Outstanding Payments</h3></div>
        <table>
          <tr><td>Customer — pending</td><td class="mono" style="text-align:right;">${fmtMoney(pending)}</td></tr>
          <tr><td>Customer — overdue</td><td class="mono" style="text-align:right;">${fmtMoney(overdue)}</td></tr>
          <tr><td>Supplier — outstanding</td><td class="mono" style="text-align:right;">${fmtMoney(supplierOutstanding)}</td></tr>

    <div class="card">
      <div class="card-head"><h3 class="card-title" style="margin:0;">Customer invoices</h3></div>

        <td><span class="badge ${r.status==='Paid'?'badge-ok':r.status==='Pending'?'badge-warn':'badge-danger'}">${r.status}</span></td>
        <td>${r.status!=='Paid'?`<button class="btn btn-ghost btn-sm" onclick="markPaid('${r.id}')">Mark paid</button>`:''}</td></tr>`).join('')}</tbody></table>
    </div>

      <table><thead><tr><th>Supplier</th><th>Amount</th><th>Method</th><th>Date</th><th>Status</th></tr></thead>
      <tbody>${STATE.supplierPayments.map(sp=>{
        const sup = STATE.suppliers.find(s=>s.id===sp.supplierId);

    `, async (d)=>{
      STATE.suppliers.push({id:uid(), name:d.name, category:d.category, contact:d.contact, terms:d.terms, lastOrder:todayISO(), outstanding:0});
      await saveState(); showToast('Supplier added'); render();
    });
  };
  document.getElementById('add-po').onclick = ()=>{
    openModal('New purchase order', `
      <div class="form-row"><div><label>Supplier</label><select name="supplierId">${STATE.suppliers.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div><div><label>PO number</label><input name="poNumber" placeholder="PO-5510" required></div></div>
      <div><label>Items</label><input name="items" required></div>
      <div class="form-row" style="margin-top:12px;"><div><label>Amount (₹)</label><input type="number" name="amount" required></div><div><label>Date</label><input type="date" name="date" value="${todayISO()}" required></div></div>
    `, async (d)=>{
      STATE.purchaseOrders.push({id:uid(), supplierId:d.supplierId, poNumber:d.poNumber, items:d.items, amount:+d.amount, status:'Ordered', date:d.date});
      const sup = STATE.suppliers.find(s=>s.id===d.supplierId);
      if(sup){ sup.outstanding += +d.amount; sup.lastOrder = d.date; }
      await saveState(); showToast('Purchase order created'); render();
    });
  };
}
window.selectSupplierCat = (cat)=>{ selectedSupplierCat = cat; render(); };

/* ---- Employee Management ---- */
function renderEmployees(c){
  const rows = [...STATE.employees];
  c.innerHTML = `
    <div class="card">
      <div class="toolbar"><h3 class="card-title" style="margin:0;">Staff roster</h3><button class="btn btn-yolk" id="add-emp">+ Add employee</button></div>
      <table><thead><tr><th>Name</th><th>Role</th><th>Phone</th><th>Joined</th><th>Status</th></tr></thead>
      <tbody>${rows.map(e=>`<tr><td>${e.name}</td><td>${e.role}</td><td class="mono">${e.phone}</td><td class="mono">${fmtDate(e.joined)}</td>
        <td><span class="badge ${e.status==='Active'?'badge-ok':'badge-warn'}">${e.status}</span></td></tr>`).join('')}</tbody></table>
    </div>
  `;
  document.getElementById('add-emp').onclick = ()=>{
    openModal('Add employee', `
      <div class="form-row"><div><label>Name</label><input name="name" required></div><div><label>Role</label><input name="role" placeholder="Coop Attendant" required></div></div>
      <div><label>Phone</label><input name="phone" required></div>
    `, async (d)=>{
      STATE.employees.push({id:uid(), name:d.name, role:d.role, phone:d.phone, joined:todayISO(), status:'Active'});
      await saveState(); showToast('Employee added'); render();
    });
  };
}

/* ---- Analytics ---- */
function renderAnalytics(c){
  const last30 = [...Array(30)].map((_,i)=>daysAgo(29-i));
  const prodTrend = last30.map(d=>STATE.production.filter(p=>p.date===d).reduce((s,p)=>s+p.quantity,0));
  const topCustomers = [...STATE.customers].sort((a,b)=>b.totalSpent-a.totalSpent).slice(0,6);
  const wasteRate = STATE.quality.length ? (STATE.quality.reduce((s,r)=>s+r.rejected,0) / STATE.quality.reduce((s,r)=>s+r.gradeA+r.gradeB+r.gradeC+r.rejected,0) * 100).toFixed(1) : '0.0';
  c.innerHTML = `
    <div class="card"><div class="card-head"><h3 class="card-title">Production — 30 day trend<small>All flocks combined</small></h3></div><div style="height:220px;"><canvas id="chart-bi-prod"></canvas></div></div>
    <div class="grid grid-2">
      <div class="card"><div class="card-head"><h3 class="card-title">Top customers<small>By lifetime value</small></h3></div><div style="height:220px;"><canvas id="chart-bi-customers"></canvas></div></div>
      <div class="card">
        <div class="card-head"><h3 class="card-title">Summary</h3></div>
        <table>
          <tr><td>Overall rejection rate</td><td class="mono" style="text-align:right;">${wasteRate}%</td></tr>
          <tr><td>Total orders logged</td><td class="mono" style="text-align:right;">${STATE.orders.length}</td></tr>
          <tr><td>Total revenue (all invoices)</td><td class="mono" style="text-align:right;">${fmtMoney(STATE.payments.reduce((s,p)=>s+p.amount,0))}</td></tr>
          <tr><td>Total expenses logged</td><td class="mono" style="text-align:right;">${fmtMoney(STATE.expenses.reduce((s,e)=>s+e.amount,0))}</td></tr>
          <tr><td>Active subscriptions</td><td class="mono" style="text-align:right;">${STATE.subscriptions.filter(s=>s.status==='Active').length}</td></tr>
          <tr><td>Items below reorder level</td><td class="mono" style="text-align:right;">${STATE.inventory.filter(i=>i.stock<=i.reorder).length}</td></tr>
        </table>
      </div>
    </div>
  `;
  lineChart('chart-bi-prod', last30.map(fmtDate), [{label:'Eggs', data:prodTrend, borderColor:'#1F3329', backgroundColor:'rgba(31,51,41,0.08)'}]);
  barChart('chart-bi-customers', topCustomers.map(c=>c.name.split(' ')[0]), [{label:'Lifetime value', data:topCustomers.map(c=>c.totalSpent), backgroundColor:'#E8A93D'}], true);
}

/* ---- Notification center (full page) ---- */
function renderNotifications(c){
  const notifs = computeNotifications();
  c.innerHTML = `
    <div class="card">
      <div class="card-head"><h3 class="card-title">All alerts<small>Computed live from every module</small></h3></div>
      ${notifs.length===0 ? '<div class="empty"><b>All clear</b>No alerts across the platform right now.</div>' :
        notifs.map(n=>`<div class="notif-item" style="padding:13px 8px; border-bottom:1px solid var(--paper-dim);">
          <div class="notif-dot" style="background:${n.type==='danger'?'var(--danger)':'var(--warn)'}; margin-top:6px;"></div>
          <div class="notif-text" style="flex:1;"><b style="font-size:13.5px;">${n.title}</b><span style="font-size:12.5px;">${n.sub}</span></div>
          <button class="btn btn-ghost btn-sm" onclick="dismissNotif('${n.id}')">Dismiss</button>
        </div>`).join('')}
    </div>
  `;
}
window.dismissNotif = async (id)=>{
  STATE.dismissedNotifs.push(id);
  await saveState(); render();
};

/* ---- Franchise Management (placeholder) ---- */

  const rows = [...STATE.franchises];
  c.innerHTML = `

      <div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;">
        <span class="placeholder-tag">Future expansion</span>
      </div>
      <div style="font-size:13px; color:var(--ink-soft); margin-top:8px;">This module is a placeholder for when Eden Nest expands beyond a single farm. Add locations here to start planning management structure, targets, and ownership ahead of time.</div>
    </div>
    <div class="card">
      <div class="toolbar"><h3 class="card-title" style="margin:0;">Locations</h3><button class="btn btn-yolk" id="add-franchise">+ Add location</button></div>
      <table><thead><tr><th>Location</th><th>City</th><th>Status</th><th>Manager</th><th>Target launch</th></tr></thead>
      <tbody>${rows.map(f=>`<tr><td>${f.name}</td><td>${f.city}</td>

        <td>${f.manager}</td><td class="mono">${f.target==='—'?'—':fmtDate(f.target)}</td></tr>`).join('')}</tbody></table>

    openModal('Add location', `
      <div class="form-row"><div><label>Location name</label><input name="name" required></div><div><label>City</label><input name="city" required></div></div>
      <div class="form-row"><div><label>Status</label><select name="status"><option>Concept</option><option>Planned</option><option>Operating</option></select></div><div><label>Manager</label><input name="manager" placeholder="Unassigned" value="Unassigned"></div></div>
      <div><label>Target launch date</label><input type="date" name="target" value="${daysAhead(180)}"></div>
    `, async (d)=>{
      STATE.franchises.push({id:uid(), name:d.name, city:d.city, status:d.status, manager:d.manager||'Unassigned', target:d.target});
      await saveState(); showToast('Location added'); render();
    });
  };
}

/* ---------- generic delete ---------- */
window.deleteRow = async (module, id)=>{
  STATE[module] = STATE[module].filter(r=>r.id!==id);
  await saveState(); showToast('Removed'); render();
};

/* ---------- init ---------- */
async function init(){
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  document.getElementById('bell-btn').onclick = toggleNotifPanel;
  await loadState();
  renderNav();
  render();
}
init();
</script>
